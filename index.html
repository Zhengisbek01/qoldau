      const answersText = Object.entries(answers).map(([q, a]) => `Вопрос: ${q}\nОтвет: ${a}`).join("\n\n");

Клиент обратился с проблемой: «${selectedProblem}» (категория: ${cat.name}).

${answersText}

s1=краткая консультация 5000₸, s2=расширенная 10000₸, s3=письменный ответ 15000₸, s4=проверка документа 15000₸, s5=претензия 20000₸, s6=срочная 15000₸.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
      });
      const data = await response.json();
      const text = (data.content || []).map(b => b.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setAiResult({ category: cat.name, summary: parsed.summary, urgency: parsed.urgency || "средняя", documents: parsed.documents || [], advice: parsed.advice || "", expert, service: services.find(s => s.id === parsed.serviceRecommendation) || services[1] });

                </div>
                <button onClick={() => { navigator.clipboard?.writeText(kaspiUrl); }}
                  style={{ background: C.navy, color: C.white, border: "none", borderRadius: 6, padding: "8px 12px", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
                  📋 Копировать
                </button>
              </div>

              <button style={S.btnGold} onClick={() => { payApp(activeApp.id); go("clientApplications"); }}>✅ Я оплатил</button>
              <button style={{ ...S.btnOutline, marginTop: 8 }} onClick={() => go("clientApplications")}>Назад</button>
            </>
          )}
        </div>
      </div>
    );
  }

  // ── CLIENT APPLICATIONS ──
  if (screen === "clientApplications") return (
    <div style={S.app}>
      <div style={S.header}>
        <button onClick={() => go("clientHome")} style={{ background: "none", border: "none", color: C.gold, fontSize: 20, cursor: "pointer" }}>←</button>
        <div style={{ textAlign: "center" }}><div style={S.headerTitle}>МОИ ЗАЯВКИ</div><div style={S.headerSub}>ИСТОРИЯ</div></div>
        <div style={{ width: 24 }} />
      </div>
      <div style={{ padding: 16, paddingBottom: 80 }}>
        {applications.length === 0 && <div style={{ textAlign: "center", color: "#666", padding: 40 }}>Заявок пока нет</div>}
        {applications.map(a => (
          <div key={a.id} onClick={() => { setActiveApp(a); go("applicationDetail"); }} style={{ ...S.card, cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: "bold", color: C.navy, fontSize: 14 }}>{a.problem}</div>
                <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>{a.expertName} · {a.serviceName}</div>
                <div style={{ fontSize: 11, color: "#999", marginTop: 4 }}>{a.createdAt}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <span style={S.tag(statusColor(a.status))}>{a.status}</span>
                {a.price > 0 && <div style={{ fontSize: 13, fontWeight: "bold", color: C.gold, marginTop: 4 }}>{a.price.toLocaleString()} ₸</div>}
              </div>
            </div>
          </div>
        ))}
      </div>
      <BottomNav screen={screen} go={go} />
    </div>
  );

  // ── APPLICATION DETAIL ──
  if (screen === "applicationDetail" && activeApp) {
    const app = applications.find(a => a.id === activeApp.id) || activeApp;
    return (
      <div style={S.app}>
        <div style={S.header}>
          <button onClick={() => go("clientApplications")} style={{ background: "none", border: "none", color: C.gold, fontSize: 20, cursor: "pointer" }}>←</button>
          <div style={{ textAlign: "center" }}><div style={S.headerTitle}>ЗАЯВКА #{String(app.id).slice(-4)}</div><div style={S.headerSub}>ДЕТАЛИ</div></div>
          <div style={{ width: 24 }} />
        </div>
        <div style={{ padding: 16 }}>
          <div style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontWeight: "bold", color: C.navy, fontSize: 15 }}>{app.problem}</div>
              <span style={S.tag(statusColor(app.status))}>{app.status}</span>
            </div>
            <div style={{ fontSize: 12, color: "#666" }}>{app.category}</div>
          </div>
          {app.aiSummary && (
            <div style={{ ...S.card, background: `${C.navy}08`, border: `1px solid ${C.navy}20` }}>
              <div style={{ color: C.gold, fontSize: 11, letterSpacing: 1, marginBottom: 6 }}>AI-РЕЗЮМЕ</div>
              <div style={{ fontSize: 13, color: C.graphite, lineHeight: 1.6 }}>{app.aiSummary}</div>
            </div>
          )}
          <div style={S.card}>
            <div style={{ fontSize: 12, color: "#666", marginBottom: 6 }}>👨‍⚖️ Эксперт: <strong>{app.expertName}</strong></div>
            <div style={{ fontSize: 12, color: "#666" }}>📋 Услуга: <strong>{app.serviceName}</strong></div>
            <div style={{ fontSize: 12, color: "#666", marginTop: 4 }}>💳 Оплата: <span style={{ color: statusColor(app.paymentStatus) }}>{app.paymentStatus}</span></div>
          </div>
          {app.expertAnswer ? (
            <div style={{ ...S.card, border: `2px solid ${C.green}` }}>
              <div style={{ color: C.green, fontSize: 11, letterSpacing: 1, marginBottom: 8 }}>✅ ОТВЕТ ЭКСПЕРТА</div>
              <div style={{ fontSize: 13, color: C.graphite, lineHeight: 1.6 }}>{app.expertAnswer}</div>
            </div>
          ) : (
            <div style={{ ...S.card, background: C.bg }}>
              <div style={{ fontSize: 13, color: "#999", textAlign: "center" }}>⏳ Эксперт ещё не ответил</div>
            </div>
          )}
          {app.paymentStatus === "Ожидает оплаты" && app.price > 0 && (
            <button style={S.btnGold} onClick={() => go("payment")}>Оплатить {app.price.toLocaleString()} ₸ →</button>
          )}
          {app.expertAnswer && !app.review && (
            <div style={S.card}>
              <div style={{ color: C.navy, fontSize: 12, fontWeight: "bold", marginBottom: 8, letterSpacing: 1 }}>⭐ ОСТАВИТЬ ОТЗЫВ</div>
              <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
                {[1, 2, 3, 4, 5].map(s => <span key={s} style={{ fontSize: 24, cursor: "pointer", color: s <= reviewStars ? C.gold : C.silver }} onClick={() => setReviewStars(s)}>★</span>)}
              </div>
              <textarea value={reviewText} onChange={e => setReviewText(e.target.value)} style={{ ...S.input, minHeight: 60, resize: "none" }} placeholder="Ваш отзыв..." />
              <button style={{ ...S.btnGold, marginTop: 8 }} onClick={() => {
                setApplications(prev => prev.map(a => a.id === app.id ? { ...a, review: { stars: reviewStars, text: reviewText }, status: "Завершена" } : a));
                go("clientApplications");
              }}>Отправить отзыв</button>
            </div>
          )}
          {app.review && (
            <div style={{ ...S.card, background: `${C.gold}10`, border: `1px solid ${C.gold}40` }}>
              <div style={{ color: C.gold }}>{"★".repeat(app.review.stars)}</div>
              <div style={{ fontSize: 13, color: C.graphite, marginTop: 4 }}>{app.review.text}</div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── EXPERT DASHBOARD (delegated to subcomponent) ──
  if (screen === "expertDashboard") return (
    <ExpertDashboard applications={applications} setApplications={setApplications} go={go} setRole={setRole} />
  );

  // ── ADMIN DASHBOARD ──
  if (screen === "adminDashboard") {
    const total = applications.length;
    const newApps = applications.filter(a => a.status === "Новая" || a.status === "Ожидает оплаты").length;
    const paid = applications.filter(a => a.paymentStatus === "Оплачена").length;
    const inWork = applications.filter(a => a.status === "В работе").length;
    const done = applications.filter(a => a.status === "Завершена").length;
    const totalSum = applications.filter(a => a.paymentStatus === "Оплачена").reduce((s, a) => s + a.price, 0);
    return (
      <div style={S.app}>
        <div style={S.header}>
          <button onClick={() => { go("roleSelect"); setRole(null); }} style={{ background: "none", border: "none", color: C.gold, fontSize: 20, cursor: "pointer" }}>←</button>
          <div style={{ textAlign: "center" }}><div style={S.headerTitle}>АДМИНИСТРАТОР</div><div style={S.headerSub}>ADAL JASA GROUP</div></div>
          <div style={{ width: 24 }} />
        </div>
        <div style={{ padding: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
            {[["Всего заявок", total, C.navy], ["Новые", newApps, C.orange], ["Оплачено", paid, C.green], ["В работе", inWork, C.navy2], ["Завершено", done, C.graphite], ["Сумма", totalSum.toLocaleString() + " ₸", C.gold]].map(([l, v, c]) => (
              <div key={l} style={{ ...S.card, textAlign: "center", padding: 12 }}>
                <div style={{ fontSize: 22, fontWeight: "bold", color: c }}>{v}</div>
                <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 13, fontWeight: "bold", color: C.navy, marginBottom: 8, letterSpacing: 1 }}>ВСЕ ЗАЯВКИ</div>
          {applications.map(a => (
            <div key={a.id} style={S.card}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <div style={{ fontWeight: "bold", color: C.navy, fontSize: 13 }}>#{String(a.id).slice(-4)} {a.clientName}</div>
                <span style={S.tag(statusColor(a.status))}>{a.status}</span>
              </div>
              <div style={{ fontSize: 12, color: "#666" }}>{a.problem}</div>
              <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>{a.expertName} · {a.price > 0 ? a.price.toLocaleString() + " ₸" : "Бесплатно"}</div>
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {["Новая", "В работе", "Ответ готов", "Завершена"].map(st => (
                  <button key={st} onClick={() => setApplications(prev => prev.map(ap => ap.id === a.id ? { ...ap, status: st } : ap))}
                    style={{ background: a.status === st ? C.navy : C.bg, color: a.status === st ? C.white : C.navy, border: `1px solid ${C.navy}`, borderRadius: 4, padding: "3px 8px", fontSize: 10, cursor: "pointer" }}>
                    {st}
                  </button>
                ))}
              </div>
            </div>
          ))}
          <div style={{ fontSize: 13, fontWeight: "bold", color: C.navy, marginBottom: 8, marginTop: 8, letterSpacing: 1 }}>ЭКСПЕРТЫ</div>
          {experts.map(e => (
            <div key={e.id} style={{ ...S.card, display: "flex", gap: 12, alignItems: "center" }}>
              <div style={{ fontSize: 24 }}>{e.avatar}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: "bold", color: C.navy, fontSize: 14 }}>{e.name}</div>
                <div style={{ fontSize: 12, color: "#666" }}>{e.spec}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  <span style={S.tag(C.gold)}>★ {e.rating}</span>
                  <span style={S.tag(C.navy2)}>{applications.filter(a => a.expertId === e.id).length} заявок</span>
                </div>
              </div>
            </div>
          ))}
          <div style={{ textAlign: "center", padding: "16px 0", color: "#999", fontSize: 11 }}>Qoldau by ADAL JASA GROUP</div>
        </div>
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
